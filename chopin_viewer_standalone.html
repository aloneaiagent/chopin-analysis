<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>肖邦钢琴大赛 · 演奏风格图谱</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ══════════════════════════════════════════════════════
   全局 & 游戏风格基础
══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep:    #070e1a;
  --bg-panel:   #0d1b2a;
  --bg-card:    #112236;
  --bg-hover:   #162d45;
  --gold:       #e6b84a;
  --gold-dim:   #9e7b2a;
  --gold-glow:  rgba(230,184,74,0.25);
  --teal:       #3dd6c8;
  --teal-dim:   rgba(61,214,200,0.15);
  --red:        #e85d5d;
  --green:      #4ec97d;
  --yellow:     #f0c040;
  --white:      #e8edf5;
  --muted:      #6b809a;
  --border:     rgba(230,184,74,0.18);
  --radar-fill: rgba(61,214,200,0.18);
  --radar-line: rgba(61,214,200,0.7);
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg-deep);
  color: var(--white);
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  overflow-x: hidden;
}

/* 顶部装饰线 */
body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  z-index: 1000;
}

/* ══════════════════════════════════════════════════════
   视图容器（display 由 JS 控制，避免 ID 特异性覆盖问题）
══════════════════════════════════════════════════════ */
.view { min-height: 100vh; }

/* ══════════════════════════════════════════════════════
   视图 1：年份选择
══════════════════════════════════════════════════════ */
#view-year {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
}

.title-logo {
  text-align: center;
  margin-bottom: 64px;
}
.title-logo .zh {
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--gold);
  text-shadow: 0 0 30px var(--gold-glow);
}
.title-logo .en {
  font-size: 14px;
  letter-spacing: 6px;
  color: var(--muted);
  margin-top: 8px;
  text-transform: uppercase;
}
.title-logo .subtitle {
  font-size: 16px;
  color: var(--muted);
  margin-top: 12px;
}

/* 装饰分割线 */
.deco-line {
  width: 240px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 20px auto;
}

.year-cards {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
  justify-content: center;
}

.year-card {
  width: 220px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.year-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}
.year-card:hover {
  background: var(--bg-hover);
  border-color: var(--gold);
  transform: translateY(-6px);
  box-shadow: 0 12px 40px rgba(230,184,74,0.15);
}
.year-card:hover::before { opacity: 1; }

.year-card .num {
  font-size: 52px;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 0 20px var(--gold-glow);
  letter-spacing: -2px;
}
.year-card .label {
  font-size: 14px;
  color: var(--muted);
  margin-top: 8px;
}
.year-card .count {
  font-size: 13px;
  color: var(--teal);
  margin-top: 12px;
}

/* ══════════════════════════════════════════════════════
   视图 2：选手列表
══════════════════════════════════════════════════════ */
#view-list {
  padding: 0;
}

.page-header {
  background: linear-gradient(180deg, #0a1828 0%, var(--bg-panel) 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky; top: 0; z-index: 100;
}

.back-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  white-space: nowrap;
}
.back-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.page-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--gold);
}

.page-sub {
  font-size: 13px;
  color: var(--muted);
  margin-left: auto;
}

/* 图例 */
.legend {
  display: flex;
  gap: 20px;
  padding: 14px 32px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: var(--muted);
}
.dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* 选手列表 */
.contestant-list {
  padding: 20px 32px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.contestant-card {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 16px 20px;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  gap: 14px;
}
.contestant-card:hover {
  background: var(--bg-hover);
  border-color: var(--gold-dim);
  transform: translateX(4px);
}

.placement-badge {
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
  width: 36px;
  text-align: center;
  flex-shrink: 0;
  line-height: 1;
}
.placement-badge.medal { font-size: 22px; }

.advancement-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ctnt-info { flex: 1; min-width: 0; }
.ctnt-name {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ctnt-stages {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

.score-badge {
  font-size: 14px;
  font-weight: 700;
  color: var(--teal);
  flex-shrink: 0;
}

/* ══════════════════════════════════════════════════════
   视图 3：选手详情
══════════════════════════════════════════════════════ */
#view-detail {
  padding: 0;
}

.detail-header {
  background: linear-gradient(180deg, #0a1828 0%, var(--bg-panel) 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky; top: 0; z-index: 100;
}

.detail-name {
  font-size: 22px;
  font-weight: 700;
}

.detail-advancement {
  font-size: 13px;
  padding: 4px 12px;
  border-radius: 12px;
  font-weight: 600;
}

.detail-body {
  padding: 32px;
  max-width: 1400px;
  margin: 0 auto;
}

/* 轮次网格：固定2列，单轮次时卡片宽度与多轮次一致 */
.stages-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 28px;
}

/* 上/下一位按钮 */
.nav-btn {
  background: rgba(230,184,74,0.1);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-btn:hover { background: var(--gold-glow); border-color: var(--gold); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }

.stage-panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.stage-panel-header {
  background: linear-gradient(135deg, #102035 0%, #0d1b2a 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.stage-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--gold);
}

.stage-score {
  font-size: 28px;
  font-weight: 800;
  color: var(--teal);
  text-shadow: 0 0 15px rgba(61,214,200,0.4);
}
.stage-score-label {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
}

/* 雷达图区 */
.radar-wrap {
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.radar-svg-container {
  position: relative;
  width: 300px;
  height: 300px;
}

/* 雷达图中心分数 */
.radar-center-score {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
}
.radar-center-score .big-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 0 12px var(--gold-glow);
}
.radar-center-score .label {
  font-size: 10px;
  color: var(--muted);
}

/* 雷达图轴说明 */
.radar-legend {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 16px;
  width: 100%;
}
.radar-legend-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.radar-legend-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--teal);
}
.radar-legend-desc {
  font-size: 10px;
  color: var(--muted);
}
.radar-legend-value {
  font-size: 11px;
  color: var(--white);
}

/* 评委分数 */
.juror-section {
  padding: 0 24px 20px;
}
.section-title {
  font-size: 13px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.chart-wrap {
  height: 160px;
  position: relative;
}

/* 曲目展开 */
.pieces-section {
  padding: 0 24px 24px;
}

.toggle-pieces-btn {
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--gold);
  padding: 10px 16px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all 0.2s;
}
.toggle-pieces-btn:hover {
  background: var(--gold-glow);
  border-color: var(--gold);
}

.toggle-icon {
  font-size: 11px;
  transition: transform 0.3s;
}
.toggle-pieces-btn.open .toggle-icon {
  transform: rotate(180deg);
}

.pieces-list {
  display: none;
  margin-top: 12px;
  gap: 10px;
  flex-direction: column;
}
.pieces-list.open { display: flex; }

.piece-item {
  background: var(--bg-deep);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 10px;
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: start;
}

.piece-name-link {
  font-size: 13px;
  font-weight: 600;
  color: var(--white);
  text-decoration: none;
}
.piece-name-link:hover { color: var(--gold); }
.piece-name-nolink {
  font-size: 13px;
  font-weight: 600;
  color: var(--white);
}

.yt-btn {
  background: none;
  border: 1px solid rgba(61,214,200,0.3);
  color: var(--teal);
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 11px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  transition: all 0.2s;
  white-space: nowrap;
}
.yt-btn:hover {
  background: var(--teal-dim);
  border-color: var(--teal);
}

/* 曲目小雷达 */
.piece-radar-mini {
  grid-column: 1 / -1;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.axis-bar {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
}
.axis-bar-label { color: var(--muted); min-width: 52px; }
.axis-bar-track {
  width: 80px;
  height: 5px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.axis-bar-fill {
  height: 100%;
  background: var(--teal);
  border-radius: 3px;
  transition: width 0.6s ease;
}
.axis-bar-val { color: var(--teal); min-width: 24px; }

/* ══════════════════════════════════════════════════════
   视图 4：轮次总览
══════════════════════════════════════════════════════ */
.stage-tab {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 8px 20px;
  border-radius: 8px 8px 0 0;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: -1px;
}
.stage-tab:hover { color: var(--white); border-color: var(--gold-dim); }
.stage-tab.active {
  background: var(--bg-panel);
  color: var(--gold);
  border-color: var(--gold-dim);
  border-bottom-color: var(--bg-panel);
}

.overview-chart-section {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.overview-chart-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
  padding: 16px 24px 12px;
  border-bottom: 1px solid var(--border);
}
.overview-chart-wrap {
  overflow-y: auto;
  padding: 16px 24px;
}

/* ══════════════════════════════════════════════════════
   加载状态
══════════════════════════════════════════════════════ */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 20px;
}
.spinner {
  width: 48px; height: 48px;
  border: 3px solid rgba(230,184,74,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#error-msg {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 16px;
  color: var(--red);
  text-align: center;
  padding: 40px;
}

/* ══════════════════════════════════════════════════════
   响应式布局（平板 / 手机）
══════════════════════════════════════════════════════ */

/* 平板：轮次总览改为2列 */
@media (max-width: 1024px) {
  #overview-charts {
    grid-template-columns: repeat(2, 1fr) !important;
    padding: 20px !important;
    gap: 20px !important;
  }
  .overview-stage-tabs {
    padding: 10px 20px 0 !important;
  }
}

/* 手机：所有网格改为1列，缩减内边距 */
@media (max-width: 640px) {
  /* 选手列表 */
  .contestants-grid {
    grid-template-columns: 1fr !important;
    padding: 16px !important;
  }

  /* 详情页轮次卡片：1列 */
  .stages-grid {
    grid-template-columns: 1fr !important;
    gap: 16px !important;
  }

  /* 详情页顶部内边距缩减 */
  .detail-header {
    padding: 16px !important;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* 上/下一位导航按钮缩小 */
  .nav-btn {
    padding: 6px 12px !important;
    font-size: 12px !important;
  }

  /* 轮次总览：1列 */
  #overview-charts {
    grid-template-columns: 1fr !important;
    padding: 16px !important;
    gap: 16px !important;
  }

  /* 总览标签页 */
  #overview-stage-tabs {
    padding: 10px 16px 0 !important;
  }

  /* 雷达图图例：1列 */
  .radar-legend {
    grid-template-columns: 1fr !important;
  }

  /* 年份选择页标题缩小 */
  .year-title {
    font-size: 22px !important;
  }
  .year-subtitle {
    font-size: 13px !important;
  }
  .year-cards {
    flex-direction: column;
    align-items: center;
  }
}
</style>
</head>
<body>

<!-- 加载状态 -->
<div id="loading" style="display:flex">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:14px;">正在加载数据…</div>
</div>

<!-- 错误状态 -->
<div id="error-msg"></div>

<!-- 视图 1：年份选择 -->
<div class="view" id="view-year" style="display:none">
  <div class="title-logo">
    <div class="zh">肖邦国际钢琴大赛</div>
    <div class="deco-line"></div>
    <div class="en">Chopin International Piano Competition</div>
    <div class="subtitle">演奏风格图谱 · 数据可视化</div>
  </div>
  <div class="year-cards" id="year-cards"></div>
  <div style="margin-top:48px; text-align:center;">
    <div style="font-size:12px;color:var(--muted);">
      五维风格雷达：自由度 · 起伏感 · 动态范围 · 音色明亮度 · 音色丰富度
    </div>
  </div>
</div>

<!-- 视图 2：选手列表 -->
<div class="view" id="view-list" style="display:none">
  <div class="page-header">
    <button class="back-btn" onclick="showView('year')">← 返回</button>
    <div class="page-title" id="list-title">2025年大赛</div>
    <div class="page-sub" id="list-sub"></div>
    <button class="nav-btn" style="margin-left:auto;" id="overview-btn"
      onclick="showOverviewView(currentYear, 'Stage I')">📊 轮次总览</button>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="dot" style="background:var(--muted)"></div> 止步第一轮
    </div>
    <div class="legend-item">
      <div class="dot" style="background:var(--green)"></div> 晋级第二轮
    </div>
    <div class="legend-item">
      <div class="dot" style="background:var(--yellow)"></div> 晋级第三轮
    </div>
    <div class="legend-item">
      <div class="dot" style="background:var(--red)"></div> 晋级决赛
    </div>
    <div class="legend-item" style="margin-left:auto; color:var(--teal); font-size:12px;">
      数字 = 综合排名 · 点击查看风格图谱
    </div>
  </div>
  <div class="contestant-list" id="contestant-list"></div>
</div>

<!-- 视图 4：轮次总览 -->
<div class="view" id="view-overview" style="display:none">
  <div class="page-header">
    <button class="back-btn" id="overview-back">← 返回列表</button>
    <div class="page-title" id="overview-title">轮次总览</div>
    <div class="page-sub" id="overview-sub"></div>
  </div>
  <div id="overview-stage-tabs" style="padding:12px 32px 0;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);"></div>
  <div id="overview-charts" style="padding:32px;display:grid;grid-template-columns:repeat(3,1fr);gap:28px;"></div>
</div>

<!-- 视图 3：选手详情 -->
<div class="view" id="view-detail" style="display:none">
  <div class="detail-header">
    <button class="back-btn" id="detail-back">← 返回列表</button>
    <div class="detail-name" id="detail-name"></div>
    <div class="detail-advancement" id="detail-advancement"></div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
      <span style="font-size:12px;color:var(--muted);" id="detail-year-label"></span>
      <button class="nav-btn" id="nav-prev">◀ 上一位</button>
      <span style="font-size:12px;color:var(--muted);white-space:nowrap;" id="nav-index"></span>
      <button class="nav-btn" id="nav-next">下一位 ▶</button>
    </div>
  </div>
  <div class="detail-body">
    <div class="stages-grid" id="stages-grid"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// 全局状态
// ══════════════════════════════════════════════════════
let DATA = null;
let currentYear = null;
let chartInstances = {};
let currentContestants = [];   // 当前年份的选手列表（保持排序）
let currentCtntIndex  = 0;    // 当前选手在列表中的下标

const AXES = [
  { key: "自由度",     desc: "演奏的节拍自由度（Rubato）", unit: "" },
  { key: "起伏感",     desc: "音量的动态波动幅度",         unit: "" },
  { key: "动态范围",   desc: "最强与最弱音量的跨度",       unit: "" },
  { key: "音色明亮度", desc: "频谱重心，越高越明亮清晰",   unit: "" },
  { key: "音色丰富度", desc: "频谱带宽，越高泛音越丰富",   unit: "" },
];

// 颜色配置
function advancementColor(stage) {
  if (!stage) return '#4b5563';
  const s = stage.toLowerCase();
  if (s.includes('final'))    return '#e85d5d';   // 红色 = 决赛
  if (s.includes('iii'))      return '#f0c040';   // 黄色 = 第三轮
  if (s.includes('ii'))       return '#4ec97d';   // 绿色 = 第二轮
  return '#4b5563';                               // 灰色 = 第一轮止步
}
function advancementText(stage) {
  if (!stage) return '第一轮';
  const map = {
    'Stage I':   '止步第一轮',
    'Stage II':  '晋级第二轮',
    'Stage III': '晋级第三轮',
    'Final':     '决赛选手',
  };
  return map[stage] || stage;
}

// ══════════════════════════════════════════════════════
// 视图切换
// ══════════════════════════════════════════════════════
function showView(name) {
  // 用 inline style 控制显示，彻底避免 CSS 特异性冲突
  document.querySelectorAll('.view').forEach(v => { v.style.display = 'none'; });
  const el = document.getElementById('view-' + name);
  if (el) {
    el.style.display = (name === 'year') ? 'flex' : 'block';
    window.scrollTo(0, 0);
  }
}

// ══════════════════════════════════════════════════════
// 视图 1：渲染年份卡片
// ══════════════════════════════════════════════════════
function renderYearView() {
  const container = document.getElementById('year-cards');
  container.innerHTML = '';
  const years = Object.keys(DATA).sort();
  years.forEach(year => {
    const contestants = DATA[year].contestants || [];

    card.className = 'year-card';

      <div class="num">${year}</div>
      <div class="label">肖邦国际钢琴大赛</div>
      <div class="count">${contestants.length} 位参赛选手</div>
    `;

// ══════════════════════════════════════════════════════
// 视图 2：选手列表
// ══════════════════════════════════════════════════════
function showListView(year) {
  currentYear = year;
  document.getElementById('list-title').textContent = `${year}年大赛`;
  const contestants = DATA[year].contestants || [];
  currentContestants = contestants;   // 保存当前列表供上下翻页使用
  document.getElementById('list-sub').textContent = `${contestants.length} 位参赛选手`;

  const container = document.getElementById('contestant-list');
  container.innerHTML = '';

  contestants.forEach(ctnt => {
    const card = document.createElement('div');
    card.className = 'contestant-card';

    // 最佳轮次平均分
    const stages = ctnt.stages || {};
    const stageNames = Object.keys(stages).sort((a, b) =>
      (stageOrder(b) - stageOrder(a))
    );
    const bestScore = stageNames.length > 0 && stages[stageNames[0]].score_mean
      ? stages[stageNames[0]].score_mean.toFixed(1)
      : '—';

    const stageList = stageNames.map(s => stageShort(s)).join(' → ');

    const medalMap = {1:'🥇', 2:'🥈', 3:'🥉'};
    const medal = medalMap[ctnt.placement];
    const badgeClass = medal ? 'placement-badge medal' : 'placement-badge';
    const badgeContent = medal || ctnt.placement;

    card.innerHTML = `
      <div class="${badgeClass}">${badgeContent}</div>
      <div class="advancement-dot" style="background:${advancementColor(ctnt.advancement)}"></div>
      <div class="ctnt-info">
        <div class="ctnt-name">${ctnt.name}</div>
        <div class="ctnt-stages">${stageList || '第一轮'}</div>
      </div>
      <div class="score-badge">${bestScore}</div>
    `;
    card.onclick = () => showDetailView(ctnt);
    container.appendChild(card);
  });

  showView('list');
}

function stageOrder(s) {
  const m = {'Stage I':1,'Stage II':2,'Stage III':3,'Final':4};
  return m[s] || 0;
}
function stageShort(s) {
  const m = {'Stage I':'第一轮','Stage II':'第二轮','Stage III':'第三轮','Final':'决赛'};
  return m[s] || s;
}

// ══════════════════════════════════════════════════════
// 视图 3：选手详情
// ══════════════════════════════════════════════════════
function showDetailView(ctnt) {
  // 记录当前下标（供上下翻页使用）
  const idx = currentContestants.findIndex(c => c.name_key === ctnt.name_key);
  if (idx !== -1) currentCtntIndex = idx;

  document.getElementById('detail-name').textContent = ctnt.name;
  document.getElementById('detail-year-label').textContent = currentYear + '年大赛';

  const advEl = document.getElementById('detail-advancement');
  advEl.textContent = advancementText(ctnt.advancement);
  advEl.style.background = advancementColor(ctnt.advancement) + '30';
  advEl.style.color = advancementColor(ctnt.advancement);
  advEl.style.border = `1px solid ${advancementColor(ctnt.advancement)}60`;

  document.getElementById('detail-back').onclick = () => showListView(currentYear);

  // 上下翻页
  const total = currentContestants.length;
  document.getElementById('nav-index').textContent = `${currentCtntIndex + 1} / ${total}`;
  const prevBtn = document.getElementById('nav-prev');
  const nextBtn = document.getElementById('nav-next');
  prevBtn.disabled = currentCtntIndex === 0;
  nextBtn.disabled = currentCtntIndex === total - 1;
  prevBtn.onclick = () => showDetailView(currentContestants[currentCtntIndex - 1]);
  nextBtn.onclick = () => showDetailView(currentContestants[currentCtntIndex + 1]);

  // 销毁旧图表
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
  chartInstances = {};

  const grid = document.getElementById('stages-grid');
  grid.innerHTML = '';

  const stages = ctnt.stages || {};
  const stageNames = Object.keys(stages).sort((a,b) => stageOrder(a)-stageOrder(b));

  stageNames.forEach(stage => {
    const data = stages[stage];
    const panel = buildStagePanel(ctnt, stage, data);
    grid.appendChild(panel);
  });

  showView('detail');
}

// ──────────────────────────────────────────────────────
// 构建单个轮次面板
// ──────────────────────────────────────────────────────
function buildStagePanel(ctnt, stage, data) {
  const panel = document.createElement('div');
  panel.className = 'stage-panel';

  const hasScore  = data.score_mean != null;
  const hasJurors = (data.juror_scores || []).length > 0;
  const jurorCount = data.juror_count || 0;
  const scoreTxt   = hasScore ? data.score_mean.toFixed(2) : '—';

  const scoreBlockHtml = hasScore
    ? `<div class="stage-score">${scoreTxt}</div>
       <div class="stage-score-label">${jurorCount}位评委均分</div>`
    : `<div style="color:#f59e0b;font-size:13px;font-weight:700;line-height:1.4;">
         ⚠ 评分数据缺失
       </div>`;

  const jurorBodyHtml = hasJurors
    ? `<div class="chart-wrap">
         <canvas id="juror-chart-${stage.replace(/\s/g,'_')}"></canvas>
       </div>`
    : `<div style="padding:18px 0;text-align:center;color:#f59e0b;font-size:13px;font-weight:600;
           background:rgba(245,158,11,0.07);border-radius:8px;border:1px solid rgba(245,158,11,0.2);">
         ⚠ 本轮评委评分数据缺失
       </div>`;

  panel.innerHTML = `
    <div class="stage-panel-header">
      <div>
        <div class="stage-name">${stageShort(stage)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">${stage}</div>
      </div>
      <div style="text-align:right">${scoreBlockHtml}</div>
    </div>

    <div class="radar-wrap">
      ${data.radar_missing ? `
      <div style="width:100%;padding:20px;text-align:center;color:#f59e0b;font-size:13px;font-weight:600;
           background:rgba(245,158,11,0.07);border-radius:8px;border:1px solid rgba(245,158,11,0.2);margin-bottom:8px;">
        ⚠ 本轮无音频特征数据，雷达图为默认占位值
      </div>` : ''}
      <div class="radar-svg-container">
        <svg id="radar-${stage.replace(/\s/g,'_')}" width="300" height="300"
          style="${data.radar_missing ? 'opacity:0.35;' : ''}"></svg>
        <div class="radar-center-score">
          ${hasScore
            ? `<div class="big-num">${scoreTxt}</div><div class="label">平均分</div>`
            : `<div style="font-size:14px;color:#f59e0b;font-weight:700;">⚠</div>
               <div class="label">无评分</div>`}
        </div>
      </div>
      <div class="radar-legend" id="legend-${stage.replace(/\s/g,'_')}"></div>
    </div>

    <div class="juror-section">
      <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;">
        <span>评委打分</span>
        ${hasJurors ? `<span style="font-size:11px;font-weight:400;letter-spacing:0;">
          <span style="color:var(--gold)">█</span> 最高&nbsp;
          <span style="color:var(--red)">█</span> 最低&nbsp;
          <span style="color:var(--teal)">█</span> 高于均值
        </span>` : ''}
      </div>
      ${jurorBodyHtml}
    </div>

    <div class="pieces-section">
      <button class="toggle-pieces-btn" id="toggle-${stage.replace(/\s/g,'_')}">
        <span>查看曲目详情 (${(data.pieces||[]).length} 首)</span>
        <span class="toggle-icon">▼</span>
      </button>
      <div class="pieces-list" id="pieces-${stage.replace(/\s/g,'_')}"></div>
    </div>
  `;

  // 渲染（延迟一帧确保 DOM 已插入）
  setTimeout(() => {
    const stageSlug = stage.replace(/\s/g,'_');
    drawRadar(`radar-${stageSlug}`, data.radar || {});
    renderRadarLegend(`legend-${stageSlug}`, data.radar || {});
    if (hasJurors) renderJurorChart(`juror-chart-${stageSlug}`, data.juror_scores);
    renderPieces(`pieces-${stageSlug}`, data.pieces || []);
    setupToggle(`toggle-${stageSlug}`, `pieces-${stageSlug}`);
  }, 0);

  return panel;
}

// ══════════════════════════════════════════════════════
// 雷达图绘制（纯 SVG）
// ══════════════════════════════════════════════════════
function drawRadar(svgId, radarData) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  const W = 300, H = 300;
  const cx = W / 2, cy = H / 2;
  const R = 100;          // 最大半径
  const N = 5;            // 5个轴
  const labels = AXES.map(a => a.key);
  const values = labels.map(k => (radarData[k] != null ? radarData[k] : 5));

  // 角度：从正上方顺时针
  function angle(i) { return (Math.PI * 2 * i) / N - Math.PI / 2; }
  function pt(i, r) {
    return [cx + r * Math.cos(angle(i)), cy + r * Math.sin(angle(i))];
  }

  let html = '';

  // 背景网格（5个环）
  for (let ring = 1; ring <= 5; ring++) {
    const r = R * ring / 5;
    const pts = Array.from({length: N}, (_, i) => pt(i, r).join(','));
    html += `<polygon points="${pts.join(' ')}"
      fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
  }

  // 轴线
  for (let i = 0; i < N; i++) {
    const [x, y] = pt(i, R);
    html += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"
      stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;
  }

  // 数据多边形
  const dataPts = values.map((v, i) => pt(i, R * Math.min(v, 10) / 10).join(','));
  html += `<polygon points="${dataPts.join(' ')}"
    fill="rgba(61,214,200,0.18)" stroke="rgba(61,214,200,0.75)" stroke-width="2"
    stroke-linejoin="round"/>`;

  // 数据点
  values.forEach((v, i) => {
    const [x, y] = pt(i, R * Math.min(v, 10) / 10);
    html += `<circle cx="${x}" cy="${y}" r="4"
      fill="var(--teal)" stroke="var(--bg-panel)" stroke-width="1.5"/>`;
  });

  // 轴标签
  labels.forEach((label, i) => {
    const [lx, ly] = pt(i, R + 22);
    const anchor = lx < cx - 5 ? 'end' : lx > cx + 5 ? 'start' : 'middle';
    html += `<text x="${lx}" y="${ly}" text-anchor="${anchor}"
      dominant-baseline="central" fill="#8fa3bc" font-size="12"
      font-family="PingFang SC, Microsoft YaHei, sans-serif">${label}</text>`;
  });

  // 刻度值（10 和 5）
  const ringLabels = [2, 4, 6, 8, 10];
  ringLabels.forEach(v => {
    const r = R * v / 10;
    const [lx, ly] = pt(0, r); // 正上方轴
    html += `<text x="${lx + 4}" y="${ly}" fill="rgba(255,255,255,0.2)"
      font-size="9" dominant-baseline="central">${v}</text>`;
  });

  svg.innerHTML = html;
}

// ──────────────────────────────────────────────────────
// 雷达图图例（轴值说明）
// ──────────────────────────────────────────────────────
function renderRadarLegend(legendId, radarData) {
  const el = document.getElementById(legendId);
  if (!el) return;
  el.innerHTML = AXES.map(a => {
    const v = radarData[a.key] != null ? radarData[a.key].toFixed(1) : '—';
    return `
      <div class="radar-legend-item">
        <div class="radar-legend-label">${a.key}</div>
        <div class="radar-legend-desc">${a.desc}</div>
        <div class="radar-legend-value">${v} / 10</div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
// 评委分数柱状图
// ══════════════════════════════════════════════════════
function renderJurorChart(canvasId, jurorScores) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (chartInstances[canvasId]) {
    try { chartInstances[canvasId].destroy(); } catch(e){}
  }

  if (!jurorScores || jurorScores.length === 0) {
    canvas.style.display = 'none';
    const msg = document.createElement('div');
    msg.style.cssText = 'color:var(--muted);font-size:13px;padding:20px 0;text-align:center';
    msg.textContent = '暂无单评委数据';
    canvas.parentNode.appendChild(msg);
    return;
  }

  const labels = jurorScores.map(j => j.juror || '评委');
  const scores = jurorScores.map(j => j.score);
  const mean   = scores.reduce((a,b) => a+b, 0) / scores.length;
  const maxVal = Math.max(...scores);
  const minVal = Math.min(...scores);

  // 颜色：最高分=金色，最低分=红色，其余按高于/低于均值分两档青色
  function barColor(s, alpha) {
    if (s === maxVal) return `rgba(230,184,74,${alpha})`;   // 金
    if (s === minVal) return `rgba(232,93,93,${alpha})`;    // 红
    return s >= mean  ? `rgba(61,214,200,${alpha * 0.9})`  // 亮青
                      : `rgba(61,214,200,${alpha * 0.4})`; // 暗青
  }

  chartInstances[canvasId] = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: scores,
        backgroundColor: scores.map(s => barColor(s, 0.75)),
        borderColor:     scores.map(s => barColor(s, 1.0)),
        borderWidth: 1,
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const s = ctx.parsed.y;
              const tag = s === maxVal ? ' 🏆最高' : s === minVal ? ' ⚠最低' : '';
              return ` ${s.toFixed(2)} 分${tag}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#6b809a',
            font: { size: 10 },
            maxRotation: 30,
          },
          grid: { color: 'rgba(255,255,255,0.04)' }
        },
        y: {
          ticks: { color: '#6b809a', font: { size: 10 } },
          grid: { color: 'rgba(255,255,255,0.04)' },
          min: Math.max(0, Math.min(...scores) - 1),
        }
      }
    }
  });
}

// ══════════════════════════════════════════════════════
// 曲目列表
// ══════════════════════════════════════════════════════
function renderPieces(piecesId, pieces) {
  const container = document.getElementById(piecesId);
  if (!container) return;

  if (!pieces || pieces.length === 0) {
    container.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0;">暂无曲目数据</div>';
    return;
  }

  container.innerHTML = pieces.map(p => {
    const nameHtml = p.youtube_url
      ? `<a class="piece-name-link" href="${p.youtube_url}" target="_blank">${p.name}</a>`
      : `<span class="piece-name-nolink">${p.name}</span>`;
    const ytBtn = p.youtube_url
      ? `<a class="yt-btn" href="${p.youtube_url}" target="_blank">▶ YouTube</a>`
      : '';

    const barsHtml = AXES.map(a => {
      const v = (p.radar && p.radar[a.key] != null) ? p.radar[a.key] : 5;
      return `
        <div class="axis-bar">
          <span class="axis-bar-label">${a.key}</span>
          <div class="axis-bar-track">
            <div class="axis-bar-fill" style="width:${v * 10}%"></div>
          </div>
          <span class="axis-bar-val">${v}</span>
        </div>`;
    }).join('');

    return `
      <div class="piece-item">
        <div>${nameHtml}</div>
        <div>${ytBtn}</div>
        <div class="piece-radar-mini">${barsHtml}</div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
// 折叠展开
// ══════════════════════════════════════════════════════
function setupToggle(btnId, listId) {
  const btn  = document.getElementById(btnId);
  const list = document.getElementById(listId);
  if (!btn || !list) return;
  btn.onclick = () => {
    const open = list.classList.toggle('open');
    btn.classList.toggle('open', open);
  };
}

// ══════════════════════════════════════════════════════
// 视图 4：轮次总览
// ══════════════════════════════════════════════════════
let overviewCharts = {};
let currentOverviewStage = 'Stage I';

function getAvailableStages(year) {
  const set = new Set();
  (DATA[year].contestants || []).forEach(c =>
    Object.keys(c.stages || {}).forEach(s => set.add(s))
  );
  return ['Stage I','Stage II','Stage III','Final'].filter(s => set.has(s));
}

function showOverviewView(year, stage) {
  currentYear = year;
  currentOverviewStage = stage;

  document.getElementById('overview-title').textContent = `${year}年大赛 · 轮次总览`;
  document.getElementById('overview-back').onclick = () => showListView(year);

  // Stage 标签页
  const tabsEl = document.getElementById('overview-stage-tabs');
  const available = getAvailableStages(year);
  tabsEl.innerHTML = available.map(s =>
    `<button class="stage-tab${s === stage ? ' active' : ''}"
       onclick="showOverviewView('${year}','${s}')">${stageShort(s)}</button>`
  ).join('');

  // 收集该轮次有数据的选手
  const contestants = (DATA[year].contestants || []).filter(c => c.stages && c.stages[stage]);
  document.getElementById('overview-sub').textContent =
    `${contestants.length} 位参赛者 · 按数值降序排列`;

  // 销毁旧图表
  Object.values(overviewCharts).forEach(c => { try { c.destroy(); } catch(e){} });
  overviewCharts = {};

  const chartsEl = document.getElementById('overview-charts');
  chartsEl.innerHTML = '';

  AXES.forEach(axis => {
    // 按该维度降序排列
    const sorted = [...contestants].sort((a, b) => {
      const va = a.stages[stage]?.radar?.[axis.key] ?? -1;
      const vb = b.stages[stage]?.radar?.[axis.key] ?? -1;
      return vb - va;
    });

    const medalMap = {1:'🥇',2:'🥈',3:'🥉'};
    const names  = sorted.map(c => {
      const prefix = medalMap[c.placement] || c.placement;
      return `${prefix}  ${c.name}`;
    });
    const values = sorted.map(c => c.stages[stage]?.radar?.[axis.key] ?? null);
    const bgColors = sorted.map(c => advancementColor(c.advancement) + 'b0');
    const borderColors = sorted.map(c => advancementColor(c.advancement));

    const barH = Math.max(320, sorted.length * 28 + 60);

    const section = document.createElement('div');
    section.className = 'overview-chart-section';
    const axisSlug = axis.key.replace(/\s/g,'_');
    section.innerHTML = `
      <div class="overview-chart-title">${axis.key}
        <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:8px;">
          0–10 归一化 · 颜色对应最高晋级轮次
        </span>
      </div>
      <div class="overview-chart-wrap" style="height:${barH}px;">
        <canvas id="ovChart_${axisSlug}" style="width:100%;height:100%;"></canvas>
      </div>`;
    chartsEl.appendChild(section);

    // 用 IIFE 保存闭包，避免 sorted 在循环中被覆盖
    (function(snapSorted) {
      setTimeout(() => {
        const canvas = document.getElementById(`ovChart_${axisSlug}`);
        if (!canvas) return;
        overviewCharts[axis.key] = new Chart(canvas.getContext('2d'), {
          type: 'bar',
          data: {
            labels: names,
            datasets: [{
              data: values,
              backgroundColor: bgColors,
              borderColor: borderColors,
              borderWidth: 1,
              borderRadius: 3,
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 400 },
            onClick: (_evt, elements) => {
              if (!elements.length) return;
              const ctnt = snapSorted[elements[0].index];
              if (!ctnt) return;
              currentContestants = DATA[year].contestants || [];
              showDetailView(ctnt);
            },
            onHover: (_evt, elements, chart) => {
              chart.canvas.style.cursor = elements.length ? 'pointer' : 'default';
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => {
                    const v = ctx.parsed.x;
